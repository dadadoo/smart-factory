# ============================================================
# 기본 설정 (모든 환경의 공통 기본값)
# 환경변수가 설정되어 있으면 이 값보다 우선합니다.
# ============================================================

# DB 접속 정보 — 운영 배포 시 반드시 환경변수(DB_URL / DB_USER / DB_PASS)로 덮어쓸 것
db.url=jdbc:mysql://localhost:3306/smart_factory?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
db.user=root
db.pass=admin1234

# 수집 주기 (ms) / 총 라운드 수
collect.interval.ms=1500
collect.rounds=10

# 이상 발생 확률
anomaly.chance=0.01
critical.chance=0.08

# 이상 감지 임계값 — SQL CASE WHEN 기준과 동기화 유지
threshold.temp.warn=80.0
threshold.temp.critical=90.0
threshold.vib.warn=40.0
threshold.vib.critical=60.0

# API 서버 포트 (0 이면 API 서버 비활성화)
api.port=8080

# DB 연결 재시도 (지수 백오프)
db.retry.max=3
db.retry.delay.ms=2000

# 쿼리 실행 재시도
query.retry.max=2
query.retry.delay.ms=500
