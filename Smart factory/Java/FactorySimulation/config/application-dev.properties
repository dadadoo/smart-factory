# ============================================================
# 개발(dev) 환경 오버레이
# APP_ENV=dev 로 실행 시 application.properties 위에 덮어씁니다.
# ============================================================

db.url=jdbc:mysql://localhost:3306/smart_factory_dev?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
db.user=dev_user
db.pass=dev1234

collect.interval.ms=500
collect.rounds=5

# 개발 중 이상 빈도를 높여 빠른 테스트
anomaly.chance=0.50
critical.chance=0.20

api.port=8080

# 개발 환경: 재시도 횟수 줄여 빠른 피드백
db.retry.max=1
db.retry.delay.ms=500
query.retry.max=1
query.retry.delay.ms=200
