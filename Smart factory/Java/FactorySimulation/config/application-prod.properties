# ============================================================
# 운영(prod) 환경 오버레이
# APP_ENV=prod 로 실행 시 application.properties 위에 덮어씁니다.
# DB 비밀번호 등 민감 값은 반드시 환경변수(DB_PASS 등)로 주입하십시오.
# ============================================================

# 운영 DB 주소 — 실제 호스트로 교체 필요
db.url=jdbc:mysql://prod-db-host:3306/smart_factory?useSSL=true&serverTimezone=UTC

collect.interval.ms=2000
collect.rounds=0

# 운영 임계값: 기본값보다 보수적으로 설정
threshold.temp.warn=78.0
threshold.temp.critical=88.0
threshold.vib.warn=38.0
threshold.vib.critical=58.0
